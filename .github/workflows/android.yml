name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Generate Clean Gradle 8.13 Wrapper
        run: |
          # 1. إنشاء مجلد مؤقت لتوليد الـ Wrapper بأمان لتفادي فحص المشروع
          mkdir clean-wrapper
          cd clean-wrapper
          gradle wrapper --gradle-version 8.13
          cd ..
          
          # 2. استبدال ونسخ الملفات السليمة والنظيفة إلى مجلد الأندرويد بمشروعك
          cp clean-wrapper/gradlew android/
          mkdir -p android/gradle/wrapper
          cp clean-wrapper/gradle/wrapper/gradle-wrapper.jar android/gradle/wrapper/
          cp clean-wrapper/gradle/wrapper/gradle-wrapper.properties android/gradle/wrapper/
          
          # 3. إعطاء صلاحية التشغيل لملف gradlew
          chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --stacktrace --no-daemon -x lint -x test

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
