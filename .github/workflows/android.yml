name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle_home

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Web
        run: npm run build
        
      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate Clean Gradle Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.13

      - name: Build Debug APK
        run: |
          cd android && ./gradlew assembleDebug --stacktrace --no-daemon -x lint -x test

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
         name: app-debug
         path: android/app/build/outputs/apk/debug/app-debug.apk
