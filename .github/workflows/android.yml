name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: 'gradle'

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'

    - name: Install web dependencies
      run: npm ci

    - name: Compile and Build Web Assets
      run: npm run build

    - name: Prepare Android assets directory
      run: |
        rm -rf android/app/src/main/assets/dist
        mkdir -p android/app/src/main/assets/dist
        cp -r dist/* android/app/src/main/assets/dist/

    - name: Grant execute permission for gradlew
      run: |
        cd android
        if [ ! -f gradlew ]; then
          # Simple fallback wrapper setup if wrapper is missing in source control
          gradle wrapper --gradle-version 8.2
        fi
        chmod +x gradlew

    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug

    - name: Build Release APK (Unsigned)
      run: |
        cd android
        ./gradlew assembleRelease

    - name: Upload Debug APK as Artifact
      uses: actions/upload-artifact@v3
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK as Artifact
      uses: actions/upload-artifact@v3
      with:
        name: app-release-unsigned
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
