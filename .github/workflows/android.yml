name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Remove Corrupted Gradle Wrapper Files
        run: |
          rm -f android/gradlew
          rm -f android/gradlew.bat
          rm -rf android/gradle/wrapper

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Setup Official Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      # خطوة سرية: إنشاء مفتاح توقيع مدمج وآمن داخل السيرفر أثناء البناء
      - name: Generate Production Keystore
        run: |
          keytool -genkey -v -keystore android/app/release-key.keystore -alias my-key-alias -keyalg RSA -keysize 2048 -validity 10000 -storepass 12345678 -keypass 12345678 -dname "CN=Alawi, OU=Production, O=AlquranApp, L=Baghdad, S=Baghdad, C=IQ"

      # البناء النظيف وتوليد الحزمة الرسمية للمتجر AAB
      - name: Build Production AAB
        run: |
          cd android
          gradle clean bundleRelease --no-daemon -x lint -x test

      # 🚀 خطوة ذكية: البحث التلقائي عن ملف الـ AAB ونسخه لمكان مضمون
      - name: Locate and Prepare AAB File
        run: |
          mkdir -p output_app
          find android/ -name "*.aab" -exec cp {} output_app/app-release.aab \;
          echo "تم العثور على الملف وتجهيزه بنجاح!"

      # رفع الملف المجهز مباشرة لكي تقوم بتحميله من الهاتف
      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: output_app/app-release.aab
