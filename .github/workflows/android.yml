name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # خطوة حاسمة: التخلص من الملفات القديمة التالفة تماماً لكي لا تسبب أي تعارض
      - name: Remove Corrupted Gradle Wrapper Files
        run: |
          rm -f android/gradlew
          rm -f android/gradlew.bat
          rm -rf android/gradle/wrapper

      # ترقية الجافا إلى 21 لتتوافق تماماً وبدون أخطاء مع Gradle 8.13
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      # تثبيت رسمي ونظيف لإصدار Gradle 8.13 على السيرفر مباشرة
      - name: Setup Official Gradle 8.13
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      # البناء باستخدام أمر gradle العالمي النظيف لتجنب الملفات المحلية
      - name: Build Debug APK
        run: |
          cd android
          gradle assembleDebug --stacktrace --no-daemon -x lint -x test

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
